name: deploy
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SHADOWIC_BASE_URL: https://shadowic.space
      SHADOWIC_PORT: 3333
    steps:
      - name: Debug private key length
        run: |
          PRIVATE_KEY="${{ secrets.PRIVATE_KEY }}"
          if [[ "$PRIVATE_KEY" == *"-----BEGIN RSA PRIVATE KEY-----"* && "$PRIVATE_KEY" == *"-----END RSA PRIVATE KEY-----"* ]]; then
            echo "Key format is correct"
          else
            echo "Key format is incorrect"
            exit 1
          fi
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Debug private key format
        run: |
          if [[ "${{ secrets.PRIVATE_KEY }}" == -----BEGIN\ RSA\ PRIVATE\ KEY-----* && "${{ secrets.PRIVATE_KEY }}" == *-----END\ RSA\ PRIVATE\ KEY----- ]]; then
            echo "Key format is correct"
          else
            echo "Key format is incorrect"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: shadowic/personal-blog:latest

      - name: Restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          request_pty: true
          use_insecure_cipher: true
          debug: true
          script: |
            set -x
            whoami
            pwd
            cd ${{ secrets.WORK_DIR }} && docker compose pull front && docker compose up -d front
