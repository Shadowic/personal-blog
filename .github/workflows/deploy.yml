name: deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SHADOWIC_BASE_URL: https://shadowic.space
      SHADOWIC_PORT: 3333
    steps:
      # Настройка QEMU (для поддержки multi-arch сборок Docker)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      # Настройка Docker Buildx (для сборки и push Docker-образов)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      # Авторизация в DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Сборка и push Docker-образа
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: shadowic/personal-blog:latest

      # Отладка SSH-подключения
      - name: Debug SSH connection
        run: |
          echo "Создаем файл private_key из секрета..."
          echo "${{ secrets.PRIVATE_KEY }}" > private_key
          chmod 600 private_key

          echo "Проверяем содержимое private_key..."
          cat private_key

          echo "Пробуем подключиться к серверу..."
          ssh -v -i private_key -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "echo 'SSH connection successful'"

      # Перезапуск приложения на сервере
      - name: Restart application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            echo "Переходим в рабочую директорию..."
            cd ${{ secrets.WORK_DIR }}

            echo "Обновляем Docker-образ..."
            docker compose pull front

            echo "Перезапускаем контейнер..."
            docker compose up -d front

            echo "Проверяем статус контейнера..."
            docker ps --filter "name=front"
